<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card - Ali Hamas</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #eef2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .id-card {
            width: 230px;
            height: 360px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            text-align: center;
            border: 1px solid #d1d9e0;
            position: relative;
        }

        .header {
            background-color: #004b87;
            color: #ffffff;
            padding: 18px 10px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
        }

        .photo {
            width: 110px;
            height: 110px;
            margin: 20px auto 10px;
            border-radius: 50%;
            border: 3px solid #004b87;
            object-fit: cover;
            background-color: #f4f4f4;
        }

        .name {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            margin-bottom: 5px;
        }

        .details {
            font-size: 13px;
            color: #444;
            line-height: 1.7;
            text-align: left;
            padding: 0 25px;
        }

        .footer {
            background-color: #004b87;
            color: #ffffff;
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 10px 0;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <div class="id-card">
        <div class="header">
            Bi'that Higher<br>Secondary School
        </div>

        <!-- The image link below uses the photo you provided -->
        <img src="image_39f3cb.jpg" alt="Ali Hamas" class="photo">

        <div class="name">Ali Hamas</div>

        <div class="details">
            <strong>Grade:</strong> 9th<br>
            <strong>ID No:</strong> 2026-001<br>
            <strong>Role:</strong> Student
        </div>

        <div class="footer">
            albithattrust.org
        </div>
    </div>

</body>

</html>
